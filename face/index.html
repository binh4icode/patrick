<!DOCTYPE html>
<html>
<head>
  <title>AI Face Filter</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>

<body>
  <h1>AI Face Filter</h1>

  <script>
    let video;
    let faceMesh;
    let faces = [];

    function preload() {
      faceMesh = ml5.faceMesh({ maxFaces: 2 });
    }

    function setup() {
      createCanvas(640, 480);
      video = createCapture(VIDEO);
      video.size(640, 480);
      video.hide();

      faceMesh.detectStart(video, gotFaces);
    }

    function draw() {
      image(video, 0, 0, width, height);

      if (faces.length > 0) {
        let face = faces[0];

        let leftEye = face.keypoints[33];
        let rightEye = face.keypoints[263];
        let nose = face.keypoints[1];

        // Glasses
        noFill();
        stroke(0);
        strokeWeight(5);
        circle(leftEye.x, leftEye.y, 70);
        circle(rightEye.x, rightEye.y, 70);
        line(leftEye.x + 35, leftEye.y, rightEye.x - 35, rightEye.y);

        // Thick Eyebrows
        noStroke();
        fill(30);

        // Left eyebrow
        beginShape();
        vertex(leftEye.x - 40, leftEye.y - 45);
        quadraticVertex(
          leftEye.x,
          leftEye.y - 70,
          leftEye.x + 40,
          leftEye.y - 45
        );
        quadraticVertex(
          leftEye.x,
          leftEye.y - 30,
          leftEye.x - 40,
          leftEye.y - 45
        );
        endShape(CLOSE);

        // Right eyebrow
        beginShape();
        vertex(rightEye.x - 40, rightEye.y - 45);
        quadraticVertex(
          rightEye.x,
          rightEye.y - 70,
          rightEye.x + 40,
          rightEye.y - 45
        );
        quadraticVertex(
          rightEye.x,
          rightEye.y - 30,
          rightEye.x - 40,
          rightEye.y - 45
        );
        endShape(CLOSE);

        // Mustache
        fill(0);
        ellipse(nose.x - 25, nose.y + 35, 50, 20);
        ellipse(nose.x + 25, nose.y + 35, 50, 20);

                // Teeth
        fill(255);
        stroke(0);
        strokeWeight(2);

        // Mouth base
        rect(nose.x - 35, nose.y + 65, 70, 30, 8);

        // Tooth lines
        line(nose.x - 18, nose.y + 65, nose.x - 18, nose.y + 95);
        line(nose.x, nose.y + 65, nose.x, nose.y + 95);
        line(nose.x + 18, nose.y + 65, nose.x + 18, nose.y + 95);

        // Horizontal split
        line(nose.x - 35, nose.y + 80, nose.x + 35, nose.y + 80);
      }
    }

    function gotFaces(results) {
      faces = results;
    }
  </script>
</body>
</html>
