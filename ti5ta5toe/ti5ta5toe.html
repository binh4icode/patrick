<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ti5ta5toe.com</title>
    <link rel="stylesheet" href="ti5ta5toe.css">

</head>

<body>
    <script src="tictactoe.js"></script>
    <div id="main">
        <h1>ti5ta5toe</h1>
        <p id="ins">Please select one or two players <br>If you selected One player just click a box and it will start
            the game. <Br>if you selected two player, First player starts as player X, Second player starts as player
            O.</p>
        <p id="68">It is turn</p>
        <br>
        <div class="ui">
            <div class="row">
                <input type="text" id="b1" class="cell" readonly onclick="mark('1')">
                <input type="text" id="b2" class="cell" readonly onclick="mark('2')">
                <input type="text" id="b3" class="cell" readonly onclick="mark('3')">

            </div>
            <div class="row">
                <input type="text" id="b4" class="cell" readonly onclick="mark('4')">
                <input type="text" id="b5" class="cell" readonly onclick="mark('5')">
                <input type="text" id="b6" class="cell" readonly onclick="mark('6')">
            </div>
            <div class="row">
                <input type="text" id="b7" class="cell" readonly onclick="mark('7')">
                <input type="text" id="b8" class="cell" readonly onclick="mark('8')">
                <input type="text" id="b9" class="cell" readonly onclick="mark('9')">

            </div>
        </div>
        <br>
        <button id="button" onclick="onePlayer()">1 player</button>
        <button id="button" onclick="reset()">reset</button>
        <button id="button" onclick="twoPlayer()">2 player</button>
        <br>
    </div>
</body>

</html>
