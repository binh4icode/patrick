   <p id="demo1" style="display:none">This is a paragraph</p>

    <h2>Javascript HTML elements</h2>
    <h2 onclick="this.innerHTML= 'you found the secret text'">click me</h2>

    <div onmouseover="mOver(this)" onmouseout="mOut(this)" style="background-color:#cbc1e1;width:120px;height:20px;padding:40px">mouse over me</div>

    <script>
        function mOver(obj) {
            obj.innerHTML = "secret Text"
        }

        function mOut(obj) {
            obj.innerHTML = "mouse over me"
        }
    </script>
